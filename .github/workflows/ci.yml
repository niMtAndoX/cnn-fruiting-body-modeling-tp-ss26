name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: apps/api
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Run backend lint
        working-directory: apps/api
        run: python -m ruff check .

      - name: Run backend tests
        working-directory: apps/api
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: apps/web
        run: PNPM_CONFIG_DANGEROUSLY_ALLOW_ALL_BUILDS=true pnpm install --frozen-lockfile

      - name: Run frontend lint
        working-directory: apps/web
        run: pnpm lint

      - name: Run frontend tests
        working-directory: apps/web
        run: pnpm test

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - uses: actions/checkout@v4

      - name: Prepare compose env
        run: cp ops/docker/.env.example ops/docker/.env

      - name: Validate compose config
        run: docker compose --env-file ops/docker/.env -f ops/docker/docker-compose.yaml config -q

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t waldpilz-api-ci .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t waldpilz-web-ci apps/web
