services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    environment:
      APP_ENV: ${API_APP_ENV}
      DEBUG: ${API_DEBUG}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_PREFIX: /api/v1
      LOG_LEVEL: ${API_LOG_LEVEL}
      CORS_ALLOW_ORIGINS: http://localhost:${WEB_PORT},http://127.0.0.1:${WEB_PORT}
      MAX_UPLOAD_SIZE_MB: ${API_MAX_UPLOAD_SIZE_MB}
      ALLOWED_UPLOAD_CONTENT_TYPES: ${API_ALLOWED_UPLOAD_CONTENT_TYPES}
      MODEL_VERSION: ${API_MODEL_VERSION}
      INFERENCE_TIMEOUT_SECONDS: ${API_INFERENCE_TIMEOUT_SECONDS}
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/api/v1/health")
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT}:80"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
